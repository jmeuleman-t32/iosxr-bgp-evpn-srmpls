iosxr:
  devices:
    - name: ic-node-1
      host: 100.71.72.1
      configuration:
        routing:
          isis_processes:
            - id: ISIS-1
              # router isis process
              nets:
                - id: "49.0000.0000.0000.0001.00"
              is_type: level-1-2
              # router isis interfaces
              interfaces:
                - name: GigabitEthernet0/0/0/0
                  passive: false
                  point_to_point: false
                  address_family:
                    - name: ipv4
                      type: unicast
                - name: GigabitEthernet0/0/0/1
                  passive: false
                  point_to_point: false
                  address_family:
                    - name: ipv4
