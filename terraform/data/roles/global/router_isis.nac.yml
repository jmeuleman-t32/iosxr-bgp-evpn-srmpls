iosxr:
  devices:
    - name: ic-node-1
      host: 100.71.72.1
      configuration:
        routing:
          isis_processes:
            - id: ISIS-1
              # router isis process
              nets:
                - id: "49.0000.0000.0000.0001.00"
              is_type: level-1-2
              segment_routing:
                global_block_from: 16000
                global_block_to: 17000
              lsp_refresh_interval: 16000
              lsp_mtu: 1400
              extended_admin_group: both
              nsr: true
              nsr_restart_time: 240
              nsf: ietf
              nsf_lifetime: 10
              nsf_interface_timer: 5
              nsf_interface_expires: 2
              lsp_check_interval: 20
              lsp_gen_interval:
                maximum_wait: 5000
                initial_wait: 50
                secondary_wait: 200
              set_overload_bit:
                on_startup: 300
                advertise_external: true
                advertise_interlevel: true
              max_lsp_lifetime: 1200
              # router isis interfaces
              interfaces:
                - name: GigabitEthernet0/0/0/0
                  passive: false
                  point_to_point: true
                  address_family:
                    - name: ipv4
                      type: unicast
                - name: GigabitEthernet0/0/0/1
                  passive: false
                  point_to_point: true
                  address_family:
                    - name: ipv4
                      type: unicast
