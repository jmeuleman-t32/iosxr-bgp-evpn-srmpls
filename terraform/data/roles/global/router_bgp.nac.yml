iosxr:
  device_groups:
  # bgp routing configuration for the spine nodes
    - name: ic-spines
      devices:
        - ic-node-1
        - ic-node-2
      configuration:
        routing:
          bgp:
            - as_number: 65000
              address_family:
                l2vpn_evpn:
                  enable: true
              bgp_router_id: "${cidrhost(cidrsubnet(loopback0_base, 8, lo0_host_id), 0)}"
              neighbor_groups:
                - name: RR-CLIENTS
                  remote_as: 65000
                  shutdown: false
                  update_source: Loopback0
                  address_family:
                    - name: l2vpn-evpn
                      route_reflector_client: true
              neighbors:
                - address: "${cidrhost(cidrsubnet(loopback0_base, 8, 3), 0)}"
                  use_neighbor_group: RR-CLIENTS
                - address: "${cidrhost(cidrsubnet(loopback0_base, 8, 4), 0)}"
                  use_neighbor_group: RR-CLIENTS
  # bgp routing configuration for the leaf nodes
    - name: ic-leafs
      devices:
        - ic-node-3
        - ic-node-4
      configuration:
        routing:
          bgp:
            - as_number: 65000
              address_family:
                l2vpn_evpn:
                  enable: true
              bgp_router_id: "${cidrhost(cidrsubnet(loopback0_base, 8, lo0_host_id), 0)}"
              neighbor_groups:
                - name: RR-SERVERS
                  remote_as: 65000
                  shutdown: false
                  update_source: Loopback0
                  address_family:
                    - name: l2vpn-evpn
              neighbors:
                - address: "${cidrhost(cidrsubnet(loopback0_base, 8, 1), 0)}"
                  use_neighbor_group: RR-SERVERS
                - address: "${cidrhost(cidrsubnet(loopback0_base, 8, 2), 0)}"
                  use_neighbor_group: RR-SERVERS