iosxr:
  templates:
    - name: underlay_eth_addr
      type: file
      file: data/roles/global/templates/interfaces_underlay.tftpl
  
  global:
    variables:
      underlay_base: "10.0.0.0/24"

  devices:
    - name: ic-node-1
      host: 100.71.72.1
      templates:
        - underlay_eth_addr
      variables:
        ge0_link_id: 0
        ge0_host_id: 1
        ge1_link_id: 1
        ge1_host_id: 1

    - name: ic-node-2
      host: 100.71.72.2
      templates:
        - underlay_eth_addr
      variables:
        ge0_link_id: 2
        ge0_host_id: 1
        ge1_link_id: 3
        ge1_host_id: 1

    - name: ic-node-3
      host: 100.71.72.3
      templates:
        - underlay_eth_addr
      variables:
        ge0_link_id: 0
        ge0_host_id: 2
        ge1_link_id: 2
        ge1_host_id: 2

    - name: ic-node-4
      host: 100.71.72.4
      templates:
        - underlay_eth_addr
      variables:
        ge0_link_id: 1
        ge0_host_id: 2
        ge1_link_id: 3
        ge1_host_id: 2