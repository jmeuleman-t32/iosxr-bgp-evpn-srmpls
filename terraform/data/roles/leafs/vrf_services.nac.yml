iosxr:
  templates:
    - name: vrf_services
      type: file
      file: data/roles/leafs/templates/vrf_services.tftpl
    - name: overlay_eth_addr
      type: file
      file: data/roles/leafs/templates/interfaces_overlay.tftpl
  
  global:
    variables:
      overlay_base: "172.16.0.0/16"

  device_groups:
    - name: ic-leafs
      variables:
        vrfs: 
        - name: 10
          description: Customer A VRF
          rd: "65000:10"
          rt: "65000:10"
        - name: 20
          description: Customer B VRF
          rd: "65000:20"
          rt: "65000:20"
        - name: 30
          description: Customer C VRF
          rd: "65000:30"
          rt: "65000:30"
      templates:
        - vrf_services
        - overlay_eth_addr